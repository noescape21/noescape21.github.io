        url: "https://profile.hackthebox.com/profile/019e589c-617e-7195-9fb5-4c13aa86b6ed",

        icon: <svg viewBox="0 0 24 24" fill="currentColor" className="h-8 w-8"><path d="m22.5106 6.4566.0008-.0123a.888.888 0 0 0-.2717-.6384c-.0084-.0084-.018-.0155-.0267-.0235-.0186-.0166-.0371-.0333-.0572-.0484-.0193-.0147-.04-.0276-.0607-.0406-.0096-.006-.0182-.0131-.0281-.0188L12.4576.1266a.891.891 0 0 0-.9223.0043L1.933 5.6744c-.0107.0062-.0203.014-.0307.0205-.0073.0047-.015.008-.0223.0128-.007.0047-.013.0106-.02.0155a.8769.8769 0 0 0-.147.1333l-.0026.003a.8872.8872 0 0 0-.2218.5847l.0009.014c-.0002.0088-.0015.0176-.0015.0264v11.0708c0 .3277.1802.6288.469.7836l9.5986 5.5417c.0076.0044.0158.0075.0236.0117a.8754.8754 0 0 0 .166.0687c.0134.004.0266.0083.0401.0117a.8793.8793 0 0 0 .072.0142c.0117.0019.0232.0045.0349.006a.835.835 0 0 0 .2157 0c.0117-.0015.0232-.0041.0348-.006a.9.9 0 0 0 .072-.0142c.0135-.0034.0267-.0077.04-.0117a.895.895 0 0 0 .0646-.0217.9134.9134 0 0 0 .1015-.047c.0078-.0042.016-.0072.0236-.0117l9.5986-5.5417a.8888.8888 0 0 0 .469-.7836V6.4779c0-.0071-.0012-.0142-.0014-.0213zM5.2543 6.0822l6.5367-3.774a.4182.4182 0 0 1 .4182 0l6.5366 3.774a.4182.4182 0 0 1 0 .7243l-6.5367 3.774a.4182.4182 0 0 1-.4182 0l-6.5366-3.774a.4182.4182 0 0 1 0-.7243zm5.6134 14.3449a.4172.4172 0 0 1-.626.3613L3.718 17.0218a.4173.4173 0 0 1-.2086-.3613V9.1279a.4172.4172 0 0 1 .6258-.3613l6.524 3.7666a.4172.4172 0 0 1 .2086.3614v7.5325zm9.623-3.7666a.4173.4173 0 0 1-.2086.3613l-6.5239 3.7666a.4172.4172 0 0 1-.6259-.3613v-7.5325c0-.149.0796-.2868.2087-.3614l6.5239-3.7666a.4172.4172 0 0 1 .6258.3613v7.5326z" /></svg>,
      },
      {
        name: "TryHackMe",
        url: "https://tryhackme.com/p/jays21",
        hoverColor: "hover:text-[#88CC14]",
        icon: <svg viewBox="0 0 24 24" fill="currentColor" className="h-8 w-8"><path d="M10.705 0C7.54 0 4.902 2.285 4.349 5.291a4.525 4.525 0 0 0-4.107 4.5 4.525 4.525 0 0 0 4.52 4.52h6.761a.625.625 0 1 0 0-1.25H4.761a3.273 3.273 0 0 1-3.27-3.27A3.273 3.273 0 0 1 6.59 7.08a.625.625 0 0 0 .7-1.035 4.488 4.488 0 0 0-1.68-.69 5.223 5.223 0 0 1 5.096-4.104 5.221 5.221 0 0 1 5.174 4.57 4.489 4.489 0 0 0-.488.305.625.625 0 1 0 .731 1.013 3.245 3.245 0 0 1 1.912-.616 3.278 3.278 0 0 1 3.203 2.61.625.625 0 0 0 1.225-.251 4.533 4.533 0 0 0-4.428-3.61 4.54 4.54 0 0 0-.958.105C16.556 2.328 13.9 0 10.705 0zm5.192 10.64a.925.925 0 0 0-.462.108.913.913 0 0 0-.313.29 1.27 1.27 0 0 0-.175.427 2.39 2.39 0 0 0-.054.514c0 .181.018.353.054.517.036.164.095.307.175.43a.899.899 0 0 0 .313.297c.127.073.281.11.462.11.18 0 .334-.037.46-.11a.897.897 0 0 0 .309-.296c.08-.124.137-.267.173-.431.036-.164.054-.336.054-.517 0-.18-.018-.352-.054-.514a1.271 1.271 0 0 0-.173-.426.901.901 0 0 0-.309-.291.917.917 0 0 0-.46-.108zm6.486 0a.925.925 0 0 0-.462.108.913.913 0 0 0-.313.29 1.27 1.27 0 0 0-.175.427 2.39 2.39 0 0 0-.053.514c0 .181.017.353.053.517.036.164.095.307.175.43a.899.899 0 0 0 .313.297c.127.073.281.11.462.11.18 0 .334-.037.46-.11a.897.897 0 0 0 .31-.296c.078-.124.136-.267.172-.431.036-.164.054-.336.054-.517 0-.18-.018-.352-.054-.514a1.271 1.271 0 0 0-.173-.426.901.901 0 0 0-.308-.291.916.916 0 0 0-.461-.108z" /></svg>,
      },
      {
        name: "KC7",
        url: "https://kc7cyber.com/profile/noescape",
        hoverColor: "hover:[&_img]:grayscale-0 hover:[&_img]:opacity-100",
        icon: <img src={KC7_LOGO} alt="KC7" className="h-8 w-8 object-contain grayscale opacity-70 transition-all duration-300" />,
      },
    ];

    function Brand({ name }) {
      if (name === "StrikeReady") {
        return (
          <span className="font-mono font-semibold tracking-[0.18em] text-gray-100">
            STRI<span className="text-[#5EEAD4]">K</span>ERE<span className="text-[#5EEAD4]">A</span>DY
          </span>
        );
      }
      return <span className="text-gray-400">{name}</span>;
    }

    function App() {
      const [activeTab, setActiveTab] = useState("home");
      const [selectedPost, setSelectedPost] = useState(null);
      const [postContent, setPostContent] = useState("");

      useEffect(() => {
        if (selectedPost) {
          fetch(selectedPost.file)
            .then((res) => res.text())
            .then((text) => setPostContent(marked.parse(text)))
            .catch(() => setPostContent('<p class="text-red-400">Error loading post. Are you running this on a server?</p>'));
        }
      }, [selectedPost]);

      const navLink = (tab, label) => (
        <button
          onClick={() => { setActiveTab(tab); setSelectedPost(null); }}
          className={activeTab === tab
            ? "text-gray-100 underline decoration-emerald-500/50 underline-offset-4"
            : "text-gray-500 hover:text-gray-300 transition-colors"}
        >
          {label}
        </button>
      );

      const SectionHeader = ({ title }) => (
        <h2 className="text-lg font-mono font-bold text-gray-200 mt-10 mb-4 tracking-tight">{title}</h2>
      );

      return (
        <div className="min-h-screen">
          <div className="max-w-3xl mx-auto px-6 py-8 md:py-16">
            <nav className="mb-6 border-b border-gray-800/80 pb-3">
              <div className="flex items-center justify-between font-mono text-sm">
                <button
                  onClick={() => { setActiveTab("home"); setSelectedPost(null); }}
                  className="text-gray-500 hover:text-gray-300 transition-colors"
                >
                  ~/home
                </button>
                <div className="flex space-x-4 md:space-x-6">
                  {navLink("home", "Index")}
                  {navLink("blog", "Blog")}
                </div>
              </div>
            </nav>

            {activeTab === "home" && (
              <div className="mb-6">
                <h1 className="text-3xl md:text-4xl font-mono font-bold tracking-tight text-gray-100 mb-2 md:mb-3">{PROFILE_DATA.name}</h1>
                <p className="text-gray-400 leading-relaxed md:leading-7 max-w-2xl text-base md:text-lg">{PROFILE_DATA.intro}</p>
              </div>
            )}

            <main className="min-h-[50vh]">
              {activeTab === "home" && (
                <div>
                  <SectionHeader title="Job Experience" />
                  <div className="space-y-4">
                    {EXPERIENCE.map((job, idx) => (
                      <div key={idx} className="flex flex-col sm:flex-row sm:justify-between sm:items-baseline text-base">
                        <div className="mb-2 sm:mb-0">
                          <span className="text-gray-200 font-medium">{job.role}</span>
                          <span className="text-gray-600 mx-2 md:mx-3">/</span>
                          <Brand name={job.company} />
                        </div>
                        <span className={`text-xs font-mono uppercase tracking-widest ${job.status === "Present" ? "text-emerald-400/90" : "text-gray-500"}`}>
                          {job.status}
                        </span>
                      </div>
                    ))}
                  </div>

                  <SectionHeader title="Connect" />
                  <div className="flex flex-wrap gap-6 mb-6">
                    {LINKS.map((link, idx) => (
                      <a
                        key={idx}
                        href={link.url}
                        target="_blank"
                        rel="noopener noreferrer"
                        title={link.name}
                        aria-label={link.name}
                        className={`flex h-10 w-10 items-center justify-center text-gray-400 transition-all duration-300 hover:-translate-y-0.5 hover:scale-105 ${link.hoverColor}`}
                      >
                        {link.icon}
                      </a>
                    ))}
                  </div>

                  <SectionHeader title="Side Projects & Tooling" />
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-w-5xl font-mono">
                    {PROJECTS.map((proj, idx) => {
                      const Tag = proj.url ? "a" : "div";
                      const extra = proj.url ? { href: proj.url, target: "_blank", rel: "noopener noreferrer" } : {};
                      return (
                        <Tag key={idx} {...extra} className="group block rounded-md border border-gray-800/80 bg-gray-900/30 p-5 hover:border-emerald-500/40 hover:bg-gray-900/60 transition-colors">
                          <h3 className="text-gray-100 text-base mb-3 group-hover:text-emerald-400 group-hover:underline underline-offset-4 transition-colors">{proj.name}</h3>
                          <p className="text-sm text-gray-400 leading-relaxed">{proj.description}</p>
                        </Tag>
                      );
                    })}
                  </div>

                  <SectionHeader title="Certifications" />
                  <div className="grid grid-cols-1 gap-4 max-w-2xl">
                    {CERTIFICATIONS.map((cert, idx) => (
                      <div key={idx} className="flex flex-col space-y-2">
                        <div className="flex items-center space-x-4">
                          <span className="text-gray-200 font-medium">{cert.abbr}</span>
                          {cert.status === "In Progress" && (
                            <span className="text-[10px] font-mono uppercase tracking-wider bg-amber-900/30 text-amber-500/90 px-2.5 py-0.5 rounded-full border border-amber-800/30">In Progress</span>
                          )}
                        </div>
                        <span className="text-gray-500 text-sm leading-relaxed">{cert.full}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === "blog" && (
                <div className="max-w-2xl">
                  {selectedPost ? (
                    <div>
                      <button onClick={() => setSelectedPost(null)} className="text-gray-500 hover:text-emerald-400 font-mono text-sm mb-6 flex items-center transition-colors">
                        &larr; Back to articles
                      </button>
                      <article
                        className="prose prose-invert prose-emerald max-w-none prose-p:text-gray-400 prose-p:leading-8 prose-headings:font-mono prose-headings:font-bold prose-a:text-emerald-400 prose-img:rounded-xl prose-img:shadow-2xl prose-pre:bg-[#161b22] prose-pre:border prose-pre:border-gray-800"
                        dangerouslySetInnerHTML={{ __html: postContent }}
                      />
                    </div>
                  ) : (
                    <div className="space-y-6 mt-4">
                      {BLOG_POSTS.map((post) => (
                        <article key={post.id} className="group cursor-pointer block" onClick={() => setSelectedPost(post)}>
                          <p className="text-xs font-mono text-gray-500 mb-3 flex items-center space-x-3 tracking-wide">
                            <span>{post.date}</span>
                            <span className="text-gray-700">|</span>
                            <span>{post.readTime}</span>
                          </p>
                          <h3 className="text-2xl font-medium text-gray-200 group-hover:text-emerald-400 transition-colors leading-tight">{post.title}</h3>
                        </article>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </main>

            <footer className="mt-16 pt-6 border-t border-gray-800/80 font-mono text-xs tracking-wide text-gray-600 flex flex-col sm:flex-row gap-2 sm:gap-0 sm:justify-between sm:items-center">
              <p className="inline-flex items-center gap-1.5">
                <span>© {new Date().getFullYear()} {PROFILE_DATA.name}.</span>
                <span className="inline-flex items-center gap-1">
                  Built with
                  <svg viewBox="0 0 24 24" fill="currentColor" className="h-3 w-3 text-emerald-500/80"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z" /></svg>
                </span>
              </p>
              <button
                onClick={() => { setActiveTab("blog"); setSelectedPost(null); }}
                className="hover:text-gray-400 transition-colors w-fit text-left"
              >
                Latest posts &rarr;
              </button>
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
