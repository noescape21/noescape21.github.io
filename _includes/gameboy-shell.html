<div class="gb-shell">
  <div class="gb-bezel">
    <div class="gb-led-row"><div class="gb-led"></div><span>BATTERY</span></div>

    <div class="gb-screen" id="gb-screen"></div>
  </div>
  <div class="gb-deck">
    <div class="gb-dpad-wrap">
      <div class="gb-dpad-cross h"></div><div class="gb-dpad-cross v"></div>
      <button class="gb-dpad-btn up" data-dir="up">▲</button>
      <button class="gb-dpad-btn down" data-dir="down">▼</button>
      <button class="gb-dpad-btn left" data-dir="left">◀</button>
      <button class="gb-dpad-btn right" data-dir="right">▶</button>
    </div>
    <div class="gb-ab">
      <div class="gb-ab-col"><button class="gb-btn-ab" data-action="back">B</button><div class="gb-btn-label">B</div></div>
      <div class="gb-ab-col"><button class="gb-btn-ab" data-action="select">A</button><div class="gb-btn-label">A</div></div>
    </div>
    <div class="gb-startsel">
      <div class="gb-startsel-col"><button class="gb-btn-pill" data-action="back"></button><div class="gb-btn-label">SELECT</div></div>
      <div class="gb-startsel-col"><button class="gb-btn-pill" data-action="select"></button><div class="gb-btn-label">START</div></div>
    </div>
  </div>
  <div class="gb-speaker"><span></span><span></span><span></span><span></span><span></span><span></span></div>
</div>
