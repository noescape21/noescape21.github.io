{% comment %}
  Usage in posts:
  {% include post-pixel-art.html src="/assets/img/pixel/concepts/example.png" alt="Description" caption="Optional caption" %}
{% endcomment %}
<figure class="post-pixel-art">
  <div class="post-pixel-art-frame">
    <img src="{{ include.src | relative_url }}" alt="{{ include.alt | default: include.caption | escape }}" loading="lazy">
  </div>
  {% if include.caption %}
  <figcaption>{{ include.caption }}</figcaption>
  {% endif %}
</figure>
